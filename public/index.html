<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Capability Service - 测试界面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        
        .subtitle {
            color: rgba(255,255,255,0.8);
            text-align: center;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .card h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.3em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        input[type="text"],
        input[type="number"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus,
        input[type="number"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            min-height: 120px;
            resize: vertical;
            font-family: inherit;
        }
        
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        @media (max-width: 600px) {
            .row {
                grid-template-columns: 1fr;
            }
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .result {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            border-left: 4px solid #667eea;
        }
        
        .result h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.1em;
        }
        
        .result-content {
            background: white;
            border-radius: 6px;
            padding: 15px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        .success {
            border-left-color: #28a745;
        }
        
        .error {
            border-left-color: #dc3545;
        }
        
        .meta-info {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
            font-size: 13px;
            color: #666;
        }
        
        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-success {
            background: #d4edda;
            color: #155724;
        }
        
        .status-error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .loading.active {
            display: block;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .health-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }
        
        .health-ok {
            background: #d4edda;
            color: #155724;
        }
        
        .health-error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 AI Capability Service</h1>
        <p class="subtitle">模型能力统一调用服务测试界面</p>
        
        <!-- 健康状态 -->
        <div class="card">
            <h2>📊 服务状态</h2>
            <div id="healthStatus">
                <span class="health-status health-error">
                    <span class="dot"></span>
                    检查中...
                </span>
            </div>
        </div>
        
        <!-- 测试表单 -->
        <div class="card">
            <h2>🧪 测试 Capability</h2>
            
            <div class="form-group">
                <label for="capability">Capability</label>
                <select id="capability">
                    <option value="text_summary">text_summary - 文本摘要</option>
                </select>
            </div>
            
            <div class="row">
                <div class="form-group">
                    <label for="requestId">Request ID (可选)</label>
                    <input type="text" id="requestId" placeholder="自动生成">
                </div>
                <div class="form-group">
                    <label for="maxLength">最大长度</label>
                    <input type="number" id="maxLength" value="100" min="10" max="500">
                </div>
            </div>
            
            <div class="form-group">
                <label for="text">输入文本</label>
                <textarea id="text" placeholder="请输入需要摘要的文本...

示例：人工智能（Artificial Intelligence），英文缩写为AI。它是研究、开发用于模拟、延伸和扩展人的智能的理论、方法、技术及应用系统的一门新的技术科学。人工智能是计算机科学的一个分支，它企图了解智能的实质，并生产出一种新的能以人类智能相似的方式做出反应的智能机器，该领域的研究包括机器人、语言识别、图像识别、自然语言处理和专家系统等。">人工智能（Artificial Intelligence），英文缩写为AI。它是研究、开发用于模拟、延伸和扩展人的智能的理论、方法、技术及应用系统的一门新的技术科学。人工智能是计算机科学的一个分支，它企图了解智能的实质，并生产出一种新的能以人类智能相似的方式做出反应的智能机器，该领域的研究包括机器人、语言识别、图像识别、自然语言处理和专家系统等。</textarea>
            </div>
            
            <button id="submitBtn" onclick="submitRequest()">
                🚀 执行 Capability
            </button>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>处理中...</p>
            </div>
            
            <div id="result" style="display: none;"></div>
        </div>
        
        <!-- 请求历史 -->
        <div class="card">
            <h2>📜 请求历史</h2>
            <div id="history">
                <p style="color: #999; text-align: center;">暂无请求记录</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let requestHistory = [];
        
        // 检查健康状态
        async function checkHealth() {
            try {
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();
                
                const healthEl = document.getElementById('healthStatus');
                if (data.status === 'ok') {
                    healthEl.innerHTML = `
                        <span class="health-status health-ok">
                            <span class="dot"></span>
                            服务正常运行
                        </span>
                        <span style="color: #666; font-size: 13px; margin-left: 10px;">
                            上次检查: ${new Date(data.timestamp).toLocaleString()}
                        </span>
                    `;
                } else {
                    healthEl.innerHTML = `
                        <span class="health-status health-error">
                            <span class="dot"></span>
                            服务异常
                        </span>
                    `;
                }
            } catch (error) {
                document.getElementById('healthStatus').innerHTML = `
                    <span class="health-status health-error">
                        <span class="dot"></span>
                        无法连接到服务
                    </span>
                `;
            }
        }
        
        // 提交请求
        async function submitRequest() {
            const capability = document.getElementById('capability').value;
            const text = document.getElementById('text').value;
            const maxLength = parseInt(document.getElementById('maxLength').value);
            const requestId = document.getElementById('requestId').value || `req-${Date.now()}`;
            
            if (!text.trim()) {
                alert('请输入文本内容');
                return;
            }
            
            const submitBtn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            
            submitBtn.disabled = true;
            loading.classList.add('active');
            result.style.display = 'none';
            
            const startTime = Date.now();
            
            try {
                const response = await fetch(`${API_BASE}/v1/capabilities/run`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        capability,
                        input: {
                            text,
                            max_length: maxLength
                        },
                        request_id: requestId
                    })
                });
                
                const data = await response.json();
                const elapsedTime = Date.now() - startTime;
                
                displayResult(data, elapsedTime);
                addToHistory(data, text);
                
            } catch (error) {
                displayError(error);
            } finally {
                submitBtn.disabled = false;
                loading.classList.remove('active');
            }
        }
        
        // 显示结果
        function displayResult(data, clientElapsed) {
            const result = document.getElementById('result');
            const isSuccess = data.ok === true;
            
            result.className = `result ${isSuccess ? 'success' : 'error'}`;
            result.innerHTML = `
                <h3>
                    <span class="status-badge ${isSuccess ? 'status-success' : 'status-error'}">
                        ${isSuccess ? '✓ 成功' : '✗ 失败'}
                    </span>
                </h3>
                <div class="result-content">${JSON.stringify(data, null, 2)}</div>
                <div class="meta-info">
                    <div class="meta-item">
                        <span>⏱️ 服务器耗时:</span>
                        <strong>${data.meta?.elapsed_ms || 0}ms</strong>
                    </div>
                    <div class="meta-item">
                        <span>🌐 客户端耗时:</span>
                        <strong>${clientElapsed}ms</strong>
                    </div>
                    <div class="meta-item">
                        <span>🆔 Request ID:</span>
                        <code>${data.meta?.request_id || 'N/A'}</code>
                    </div>
                </div>
            `;
            result.style.display = 'block';
        }
        
        // 显示错误
        function displayError(error) {
            const result = document.getElementById('result');
            result.className = 'result error';
            result.innerHTML = `
                <h3>
                    <span class="status-badge status-error">✗ 请求失败</span>
                </h3>
                <div class="result-content" style="color: #dc3545;">
                    ${error.message}
                </div>
            `;
            result.style.display = 'block';
        }
        
        // 添加到历史记录
        function addToHistory(data, inputText) {
            requestHistory.unshift({
                time: new Date().toLocaleString(),
                capability: data.meta?.capability,
                success: data.ok,
                elapsed: data.meta?.elapsed_ms,
                preview: inputText.substring(0, 50) + '...'
            });
            
            // 只保留最近10条
            if (requestHistory.length > 10) {
                requestHistory = requestHistory.slice(0, 10);
            }
            
            renderHistory();
        }
        
        // 渲染历史记录
        function renderHistory() {
            const historyEl = document.getElementById('history');
            
            if (requestHistory.length === 0) {
                historyEl.innerHTML = '<p style="color: #999; text-align: center;">暂无请求记录</p>';
                return;
            }
            
            historyEl.innerHTML = requestHistory.map((item, index) => `
                <div style="
                    padding: 12px;
                    margin-bottom: 10px;
                    background: ${item.success ? '#f0f9f0' : '#fdf2f2'};
                    border-radius: 6px;
                    border-left: 3px solid ${item.success ? '#28a745' : '#dc3545'};
                ">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-weight: 500;">${item.capability}</span>
                        <span style="font-size: 12px; color: #666;">${item.time}</span>
                    </div>
                    <div style="font-size: 13px; color: #666; margin-top: 5px;">
                        ${item.preview}
                    </div>
                    <div style="font-size: 12px; color: #999; margin-top: 5px;">
                        ⏱️ ${item.elapsed}ms | ${item.success ? '✓ 成功' : '✗ 失败'}
                    </div>
                </div>
            `).join('');
        }
        
        // 初始化
        checkHealth();
        setInterval(checkHealth, 30000); // 每30秒检查一次健康状态
    </script>
</body>
</html>
